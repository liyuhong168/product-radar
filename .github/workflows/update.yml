name: Update Product Radar

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 08:00 UTC (16:00 Beijing)
    - cron: '0 14 * * *'  # Daily at 14:00 UTC (22:00 Beijing)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scan
        run: python3 run_scan.py
        continue-on-error: true

      - name: Generate HTML
        run: python3 generate_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ output/ -f
          git diff --cached --quiet || git commit -m "auto-update $(date -u '+%Y-%m-%d %H:%M')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - id: deployment
        uses: actions/deploy-pages@v4
