name: Deploy Product Radar

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare deployment
        run: |
          # Create deploy directory
          mkdir -p deploy/data/channels
          
          # Copy output files
          cp -r output/* deploy/
          
          # Copy shared design system
          if [ -d shared ]; then
            cp -r shared deploy/shared
          fi
          
          # Copy data files for date picker
          cp data/channels/*.json deploy/data/channels/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - id: deployment
        uses: actions/deploy-pages@v4
