<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三店运营OA</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
/* ── Reset & Base ── */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif; }
body { display:flex; background:#f5f5f7; color:#1d1d1f; }

/* ── Sidebar ── */
#sidebar {
    width:240px; min-width:240px; height:100vh;
    background:#1a1a2e;
    color:#fff;
    display:flex; flex-direction:column;
    user-select:none;
    transition:width .2s ease, min-width .2s ease;
    overflow:hidden;
    z-index:100;
}
.sidebar-header {
    padding:20px 16px 12px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    flex-shrink:0;
}
.sidebar-header .logo {
    font-size:24px; font-weight:700; display:flex; align-items:center; gap:10px;
}
.sidebar-header .logo-icon { font-size:28px; }
.sidebar-header .logo-text { display:flex; flex-direction:column; }
.sidebar-header .logo-title { font-size:16px; font-weight:600; letter-spacing:0.5px; }
.sidebar-header .logo-sub { font-size:11px; color:rgba(255,255,255,0.45); margin-top:1px; letter-spacing:1px; }

#nav { flex:1; overflow-y:auto; padding:8px 0; }
#nav::-webkit-scrollbar { width:3px; }
#nav::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }

.nav-group-label {
    font-size:10px; text-transform:uppercase; letter-spacing:1.2px;
    color:rgba(255,255,255,0.3); padding:16px 16px 6px; font-weight:600;
}
.nav-group-label.dim { color:rgba(255,255,255,0.15); }

.nav-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; margin:1px 8px; border-radius:8px;
    color:rgba(255,255,255,0.7); text-decoration:none;
    transition:all .15s ease; cursor:pointer;
    font-size:14px; font-weight:500;
}
.nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.nav-item.active {
    background:rgba(255,255,255,0.12); color:#fff;
    box-shadow:inset 3px 0 0 rgba(255,255,255,0.3);
}
.nav-icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
.nav-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nav-empty { font-size:12px; color:rgba(255,255,255,0.2); padding:6px 16px 16px; font-style:italic; }

.sidebar-footer {
    padding:12px 16px;
    border-top:1px solid rgba(255,255,255,0.08);
    font-size:11px; color:rgba(255,255,255,0.3);
    flex-shrink:0;
}
.sidebar-footer .ver { font-size:10px; }

/* ── Main Area ── */
#main {
    flex:1; display:flex; flex-direction:column; overflow:hidden;
    background:#f5f5f7;
}
#topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:48px; min-height:48px;
    background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,0,0,0.06);
    z-index:50;
}
#topbar .module-title {
    font-size:15px; font-weight:600; color:#1d1d1f;
    display:flex; align-items:center; gap:8px;
}
#topbar .module-title .indicator {
    width:6px; height:6px; border-radius:50%; background:#34c759; display:inline-block;
}
#topbar .topbar-right {
    display:flex; align-items:center; gap:16px; font-size:13px; color:#6e6e73;
}
#topbar .last-update { font-size:12px; color:#aeaeb2; }
#clock { font-variant-numeric:tabular-nums; font-weight:500; }

#content-wrap {
    flex:1; position:relative; overflow:hidden;
    margin:0; padding:0;
}
#content-frame {
    width:100%; height:100%; border:none; display:block;
}

/* ── Loading overlay ── */
#loading {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:#f5f5f7; z-index:20; opacity:0; pointer-events:none;
    transition:opacity .2s ease;
}
#loading.show { opacity:1; }
#loading .spinner {
    width:28px; height:28px; border:3px solid #e5e5ea; border-top-color:#1a1a2e;
    border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Mobile Responsive ── */
@media (max-width:768px) {
    #sidebar { width:60px; min-width:60px; }
    .nav-label, .nav-group-label, .sidebar-footer, .logo-text, .nav-empty, .sidebar-header .logo-sub { display:none; }
    .sidebar-header { padding:16px 12px; }
    .sidebar-header .logo { justify-content:center; }
    .nav-item { padding:12px; justify-content:center; margin:1px 4px; }
    .nav-icon { font-size:20px; width:auto; }
    #topbar { padding:0 12px; }
    #topbar .last-update { display:none; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">📋</span>
            <div class="logo-text">
                <span class="logo-title">三店运营OA</span>
                <span class="logo-sub">322 · 007 · 027</span>
            </div>
        </div>
    </div>
    <nav id="nav">
        <div class="nav-group-label">核心业务</div><a class="nav-item" data-key="platform" href="#" onclick="return switchModule('platform','platform.html')"><span class="nav-icon">🎯</span><span class="nav-label">选品平台</span></a><a class="nav-item" data-key="radar" href="#" onclick="return switchModule('radar','radar/')"><span class="nav-icon">📡</span><span class="nav-label">跨境雷达</span></a><a class="nav-item" data-key="analysis" href="#" onclick="return switchModule('analysis','analysis/')"><span class="nav-icon">📊</span><span class="nav-label">产品分析</span></a><div class="nav-group-label dim">扩展板块（待添加）</div><div class="nav-empty">暂无板块</div>
    </nav>
    <div class="sidebar-footer">
        <div class="ver">OA v2.0 · 部署 2026-07-10</div>
    </div>
</aside>

<!-- Main -->
<div id="main">
    <div id="topbar">
        <div class="module-title">
            <span class="indicator"></span>
            <span id="current-module">选品平台</span>
        </div>
        <div class="topbar-right">
            <span class="last-update" id="last-update"></span>
            <span id="clock">--:--:--</span>
        </div>
    </div>
    <div id="content-wrap">
        <div id="loading"><div class="spinner"></div></div>
        <iframe id="content-frame" src="platform.html" loading="eager"></iframe>
    </div>
</div>

<script>
// ── Navigation ──
const MODULES = [{"key": "platform", "label": "选品平台", "icon": "🎯", "url": "platform.html", "desc": "产品发现、扫描、看板管理"}, {"key": "radar", "label": "跨境雷达", "icon": "📡", "url": "radar/", "desc": "24h跨境电商情报聚合"}, {"key": "analysis", "label": "产品分析", "icon": "📊", "url": "analysis/", "desc": "运营数据与补货分析"}];
const LABEL_MAP = {};
MODULES.forEach(m => { LABEL_MAP[m.key] = m.label; });

const frame = document.getElementById('content-frame');
const loading = document.getElementById('loading');
const titleEl = document.getElementById('current-module');
const updateEl = document.getElementById('last-update');
let currentKey = localStorage.getItem('oa_module') || 'platform';
let loadTimer = null;

function switchModule(key, url) {
    // Update nav active state
    document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.key === key);
    });
    // Update title
    titleEl.textContent = LABEL_MAP[key] || key;
    // Show loading
    loading.classList.add('show');
    // Set iframe src
    frame.src = url;
    // Save preference
    localStorage.setItem('oa_module', key);
    currentKey = key;
    return false;
}

// Iframe load complete → hide loading
frame.addEventListener('load', function() {
    loading.classList.remove('show');
    updateEl.textContent = '已加载 ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
});

// Restore last module on page load
window.addEventListener('DOMContentLoaded', function() {
    const saved = localStorage.getItem('oa_module');
    if (saved) {
        const item = MODULES.find(m => m.key === saved);
        if (item) {
            switchModule(item.key, item.url);
        }
    }
    // Set active for current
    document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.key === currentKey);
    });
});

// ── Live Clock ──
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0') + ':' +
        String(now.getSeconds()).padStart(2,'0');
}
updateClock();
setInterval(updateClock, 1000);

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
    if (e.altKey || e.ctrlKey || e.metaKey) return;
    const items = document.querySelectorAll('.nav-item');
    const idx = Array.from(items).findIndex(el => el.classList.contains('active'));
    if (e.key === 'ArrowDown' && idx < items.length - 1) {
        e.preventDefault();
        items[idx+1].click();
    } else if (e.key === 'ArrowUp' && idx > 0) {
        e.preventDefault();
        items[idx-1].click();
    }
});
</script>
</body>
</html>
