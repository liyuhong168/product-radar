    <style>
:root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --border: #e5e5ea;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --discovery: #5856D6;
    --radar: #007AFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}
.container { max-width: 1440px; margin: 0 auto; padding: 24px; }

/* Header */
.header { margin-bottom: 20px; }
.header-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.version { font-size: 12px; background: var(--discovery); color: white; padding: 2px 8px; border-radius: 8px; }
.scan-info { color: var(--text-secondary); font-size: 14px; }
.stat-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.stat-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }

/* Source Tabs */
.source-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.source-tab {
    padding: 12px 24px; border: none; border-radius: 14px;
    background: var(--card-bg); color: var(--text-secondary);
    font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: var(--shadow); transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
}
.source-tab:hover { background: #e8e8ed; }
.source-tab.active { color: white; }
.source-tab .tab-count {
    background: rgba(255,255,255,0.3); border-radius: 10px;
    padding: 0 8px; font-size: 13px; min-width: 24px; text-align: center;
}
.source-tab:not(.active) .tab-count { background: #e5e5ea; }

/* Status Filter */
.status-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
.status-tab {
    padding: 5px 12px; border: 2px solid var(--s-color, #8e8e93);
    border-radius: 16px; background: transparent;
    color: var(--s-color, #8e8e93); font-size: 12px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.status-tab:hover, .status-tab.active { background: var(--s-color, #8e8e93); color: white; }

/* Filter Bar */
.filter-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; flex-wrap: wrap;
    padding: 12px 16px; background: var(--card-bg);
    border-radius: var(--radius); box-shadow: var(--shadow);
}
.search-box { flex: 1; min-width: 200px; }
.search-box input {
    width: 100%; padding: 8px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--discovery); }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
.filter-group select {
    padding: 7px 12px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 13px; background: white; cursor: pointer; outline: none;
}
.btn-export {
    padding: 8px 16px; border: none; border-radius: 10px;
    background: var(--discovery); color: white; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.btn-export:hover { opacity: 0.85; }

/* Product Grid */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
}

/* Product Card */
.product-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    border-left: 4px solid transparent;
    position: relative;
}
.product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.product-card[data-source="discovery"] { border-left-color: var(--discovery); }
.product-card[data-source="radar"] { border-left-color: var(--radar); }
.product-card[data-status="listed"] { opacity: 0.7; }
.product-card[data-status="rejected"] { opacity: 0.5; }

/* New Badge */
.badge-new {
    position: absolute; top: 12px; right: 12px;
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    background: #34C759; color: white;
}
.badge-dual {
    position: absolute; top: 12px; right: 12px;
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    background: var(--discovery); color: white;
}
.badge-repeat {
    position: absolute; top: 12px; right: 12px;
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
    background: #f0f0f5; color: #8e8e93;
}

.card-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.source-badge {
    padding: 3px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 700; color: white;
}
.source-badge.discovery { background: var(--discovery); }
.source-badge.radar { background: var(--radar); }
.signal-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.signal-badge {
    padding: 2px 8px; border-radius: 6px;
    font-size: 10px; font-weight: 600;
    background: #f0f0f5; color: var(--text-secondary);
}
.signal-badge.tiktok { background: #FF2D5515; color: #FF2D55; }
.signal-badge.multi { background: #AF52DE15; color: #AF52DE; }
.signal-badge.sd-deep-blue { background: #007AFF15; color: #007AFF; font-weight: 700; }

.score-badge {
    padding: 4px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
}
.score-badge.score-hot { background: #FF2D5515; color: #FF2D55; }
.score-badge.score-high { background: #FF950015; color: #FF9500; }
.score-badge.score-mid { background: #007AFF15; color: #007AFF; }
.score-badge.score-low { background: #f0f0f5; color: #8e8e93; }

.product-image { margin: 8px 0; text-align: center; cursor: pointer; }
.product-image img {
    max-width: 100%; max-height: 180px; object-fit: contain;
    border-radius: 8px; transition: transform 0.2s;
}
.product-image img:hover { transform: scale(1.02); }
.img-placeholder {
    width: 100%; height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #f5f5f7; border-radius: 8px; color: #8e8e93; font-size: 28px;
}
.img-placeholder small { font-size: 11px; margin-top: 4px; color: #aeaeb2; }

.product-name {
    font-size: 15px; font-weight: 600; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
}
.product-name a { color: var(--text); text-decoration: none; }
.product-name a:hover { color: var(--discovery); }

.product-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-secondary); }
.product-meta span { white-space: nowrap; }

/* Discovery Reason */
.discovery-reason {
    font-size: 12px; color: var(--text-secondary);
    background: #f0f0f8; padding: 8px 12px; border-radius: 8px;
    line-height: 1.6; border-left: 3px solid var(--discovery);
}

/* Profit Bar */
.profit-section { display: flex; align-items: center; gap: 10px; }
.profit-bar-bg { flex: 1; height: 8px; background: #e5e5ea; border-radius: 4px; overflow: hidden; }
.profit-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
.profit-text { font-size: 14px; font-weight: 700; white-space: nowrap; }
.profit-text.high { color: #34C759; }
.profit-text.mid { color: #FF9500; }
.profit-text.low { color: #FF3B30; }

/* Cost Breakdown */
.cost-toggle {
    font-size: 12px; color: var(--discovery); cursor: pointer;
    border: none; background: #f0f0f8; padding: 4px 10px;
    border-radius: 8px; transition: background 0.2s;
}
.cost-toggle:hover { background: #e0e0f0; }
.cost-detail {
    display: none; font-size: 12px; color: var(--text-secondary);
    background: #f5f5f7; padding: 10px 12px; border-radius: 8px;
    line-height: 1.8; margin-top: 4px; border-left: 3px solid var(--discovery);
}
.cost-detail.show { display: block; }

/* Status Buttons */
.status-btns {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border);
}
.status-btn {
    padding: 5px 10px; border: 2px solid var(--s-color, #8e8e93);
    border-radius: 10px; background: transparent;
    color: var(--s-color, #8e8e93); font-size: 11px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.status-btn:hover, .status-btn.active { background: var(--s-color, #8e8e93); color: white; }

/* Amazon Link */
.btn-amazon {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px; border: 2px solid #FF6A00;
    border-radius: 10px; background: transparent;
    color: #FF6A00; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
}
.btn-amazon:hover { background: #FF6A00; color: white; }

/* Empty State */
.empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-hint { font-size: 13px; margin-top: 8px; }

/* Responsive */
@media (max-width: 768px) {
    .container { padding: 12px; }
    .header h1 { font-size: 22px; }
    .product-grid { grid-template-columns: 1fr; }
    .filter-bar { flex-direction: column; }
    .search-box { min-width: 100%; }
    .source-tabs { flex-wrap: wrap; }
}

const STATUS_CONFIG = {"pending": ["\u5f85\u8bc4\u4f30", "#8e8e93"], "supplier": ["\u627e\u4f9b\u5e94\u5546", "#007AFF"], "sample": ["\u5df2\u91c7\u6837", "#FF9500"], "listed": ["\u5df2\u4e0a\u67b6", "#34C759"], "rejected": ["\u4e0d\u8003\u8651", "#FF3B30"]};
const statusKey = 'productPlatform_v1_status';

// Load saved statuses
function getStatuses() {
    try { return JSON.parse(localStorage.getItem(statusKey) || '{}'); } catch(e) { return {}; }
}
function saveStatus(asin, status) {
    const s = getStatuses();
    if (status === 'pending') delete s[asin]; else s[asin] = status;
    localStorage.setItem(statusKey, JSON.stringify(s));
}

// Render products
let currentSource = 'all';
let currentStatus = 'all';

function render() {
    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    const search = document.getElementById('searchInput').value.toLowerCase();
    const priceFilter = document.getElementById('filterPrice').value;
    const marginFilter = document.getElementById('filterMargin').value;
    const sortBy = document.getElementById('sortBy').value;
    const statuses = getStatuses();

    let filtered = DATA.filter(p => {
        // Source filter
        if (currentSource !== 'all' && p.source_type !== currentSource) return false;
        // Status filter
        const st = statuses[p.asin] || 'pending';
        if (currentStatus !== 'all' && st !== currentStatus) return false;
        // Search
        if (search && !p.name.toLowerCase().includes(search)) return false;
        // Price
        if (priceFilter !== 'all') {
            const [min, max] = priceFilter.split('-').map(Number);
            if (p.price < min || p.price > max) return false;
        }
        // Margin
        if (marginFilter !== 'all') {
            const minMargin = Number(marginFilter) / 100;
            if ((p.profit_margin || 0) < minMargin) return false;
        }
        return true;
    });

    // Sort
    filtered.sort((a, b) => {
        if (sortBy === 'score') return (b.score || 0) - (a.score || 0);
        if (sortBy === 'margin') return (b.profit_margin || 0) - (a.profit_margin || 0);
        if (sortBy === 'price') return (a.price || 0) - (b.price || 0);
        if (sortBy === 'reviews') return (a.reviews || 0) - (b.reviews || 0);
        if (sortBy === 'new') {
            const aNew = a.is_new ? 1 : 0;
            const bNew = b.is_new ? 1 : 0;
            if (aNew !== bNew) return bNew - aNew;
            return (b.score || 0) - (a.score || 0);
        }
        return 0;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    grid.innerHTML = filtered.map(p => {
        const st = statuses[p.asin] || 'pending';
        const margin = ((p.profit_margin || 0) * 100).toFixed(1);
        const marginClass = margin >= 30 ? 'high' : margin >= 20 ? 'mid' : 'low';
        const barColor = margin >= 30 ? '#34C759' : margin >= 20 ? '#FF9500' : '#FF3B30';
        const score = p.score || 0;
        const scoreClass = score >= 120 ? 'score-hot' : score >= 80 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';

        // Badge
        let badge = '';
        if (p.is_dual_source) badge = '<span class="badge-dual">🔗 双源</span>';
        else if (p.is_new) badge = '<span class="badge-new">✨ NEW</span>';

        // Source badge
        const srcType = p.source_type || 'radar';
        const srcLabel = srcType === 'discovery' ? '🔍 趋势发现' : '📡 雷达';

        // Image
        const img = p.image_url
            ? `<div class="product-image"><img src="${p.image_url}" alt="${esc(p.name)}" loading="lazy" /></div>`
            : '<div class="product-image"><div class="img-placeholder">📦<small>无图片</small></div></div>';

        // Amazon URL
        const amazonUrl = p.amazon_url || (p.asin ? `https://www.amazon.co.uk/dp/${p.asin}` : '#');

        // Cost breakdown
        const cb = p.cost_breakdown || {};
        const costHtml = cb.vat ? `
            <button class="cost-toggle" onclick="this.nextElementSibling.classList.toggle('show')">💰 成本明细</button>
            <div class="cost-detail">
                VAT: £${cb.vat?.toFixed(2) || '-'} · 佣金: £${cb.commission?.toFixed(2) || '-'} · FBA: £${cb.fba?.toFixed(2) || '-'}<br>
                广告: £${cb.ads?.toFixed(2) || '-'} · 退货: £${cb.returns?.toFixed(2) || '-'} · 采购: £${cb.sourcing?.toFixed(2) || '-'}<br>
                <b>总成本: £${cb.total_cost?.toFixed(2) || '-'} · 净利润: £${(p.net_profit || 0).toFixed(2)}</b>
            </div>` : '';

        // Sources
        const sources = (p.sources || []).map(s => {
            let cls = '';
            if (s.includes('TikTok')) cls = 'tiktok';
            else if (s.includes('多源')) cls = 'multi';
            return `<span class="signal-badge ${cls}">${s}</span>`;
        }).join('');

        // SD label
        const sdHtml = p.sd_label ? `<span class="signal-badge sd-deep-blue">${p.sd_label}</span>` : '';

        // Discovery reason
        const reasonHtml = p.source_type === 'discovery' && p.reason
            ? `<div class="discovery-reason">💡 ${esc(p.reason)}</div>` : '';

        // First seen
        const firstSeen = p.first_seen ? `<span>发现: ${p.first_seen}</span>` : '';

        return `
        <div class="product-card" data-source="${srcType}" data-status="${st}" data-asin="${p.asin || ''}">
            ${badge}
            <div class="card-header">
                <span class="source-badge ${srcType}">${srcLabel}</span>
                <div class="signal-badges">${sources}${sdHtml}</div>
                <span class="score-badge ${scoreClass}">${score}分</span>
            </div>
            ${img}
            <div class="product-name"><a href="${amazonUrl}" target="_blank" rel="noopener">${esc(p.name)}</a></div>
            <div class="product-meta">
                <span>💷 £${(p.price || 0).toFixed(2)}</span>
                <span>⭐ ${p.rating || '-'} (${p.reviews || 0})</span>
                ${firstSeen}
            </div>
            <div class="profit-section">
                <div class="profit-bar-bg"><div class="profit-bar" style="width:${Math.min(margin, 50) * 2}%;background:${barColor}"></div></div>
                <span class="profit-text ${marginClass}">${margin}%</span>
            </div>
            ${costHtml}
            ${reasonHtml}
            <div class="status-btns">
                ${Object.entries(STATUS_CONFIG).map(([k, [label, color]]) =>
                    `<button class="status-btn ${st===k?'active':''}" style="--s-color:${color}" onclick="setStatus('${p.asin}','${k}',this)">${label}</button>`
                ).join('')}
                <a class="btn-amazon" href="${amazonUrl}" target="_blank" rel="noopener">🛒 Amazon</a>
            </div>
        </div>`;
    }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function setStatus(asin, status, btn) {
    saveStatus(asin, status);
    const card = btn.closest('.product-card');
    card.dataset.status = status;
    card.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// Source tabs
document.getElementById('sourceTabs').addEventListener('click', e => {
    const tab = e.target.closest('.source-tab');
    if (!tab) return;
    document.querySelectorAll('.source-tab').forEach(t => {
        t.classList.remove('active');
        t.style.background = 'var(--card-bg)';
        t.style.color = 'var(--text-secondary)';
    });
    tab.classList.add('active');
    tab.style.background = 'var(--tab-color)';
    tab.style.color = 'white';
    currentSource = tab.dataset.source;
    render();
});

// Status tabs
document.querySelector('.status-filter').addEventListener('click', e => {
    const tab = e.target.closest('.status-tab');
    if (!tab) return;
    document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentStatus = tab.dataset.status;
    render();
});

// Filter events
['searchInput', 'filterPrice', 'filterMargin', 'sortBy'].forEach(id => {
    document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', render);
});

// CSV export
function exportCSV() {
    const statuses = getStatuses();
    const rows = [['来源','ASIN','名称','价格','利润率','评分','状态','链接']];
    DATA.forEach(p => {
        const st = statuses[p.asin] || 'pending';
        rows.push([
            p.source_type === 'discovery' ? '趋势发现' : '雷达',
            p.asin || '',
            p.name || '',
            (p.price || 0).toFixed(2),
            ((p.profit_margin || 0) * 100).toFixed(1) + '%',
            p.score || 0,
            STATUS_CONFIG[st]?.[0] || st,
            p.amazon_url || ''
        ]);
    });
    const csv = rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '选品平台_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
}

// Init source tabs styling
document.querySelectorAll('.source-tab').forEach(t => {
    if (t.classList.contains('active')) {
        t.style.background = 'var(--tab-color)';
        t.style.color = 'white';
    }
});

// Initial render
render();
    </script>
